<section class="bg-gray-100 dark:bg-[#1F262F] min-h-screen pb-12 sm:pb-15 pt-24 sm:pt-28 lg:pt-32">
  <div class="container mx-auto px-4 sm:px-6">

    <!-- Header -->
    <div class="text-center px-2">
      <h2 class="text-2xl md:text-3xl lg:text-4xl text-main-500 dark:text-main-400
                 py-3 leading-relaxed font-bold" data-aos="fade-right" data-aos-delay="100">
        My Services
      </h2>
      <p class="dark:text-white text-gray-800 text-base sm:text-lg lg:text-xl font-semibold
                w-full sm:w-[85%] lg:w-[75%] mx-auto leading-relaxed" data-aos="fade-up" data-aos-delay="300">
        Building scalable, performance-driven web applications with Angular.
        Here are the key services I provide to help your business succeed.
      </p>
    </div>

    <!-- Grid -->
    <div class="pt-6 sm:pt-8 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
      @for (service of services_arr; track $index) {
      <div data-aos="flip-right" [attr.data-aos-delay]="$index * 150">
        <app-service-card [service]="service"></app-service-card>
      </div>
      }
    </div>

  </div>
</section>
