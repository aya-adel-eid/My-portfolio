<div class="dark:text-white text-gray-800 flex flex-col h-full w-full mt-3
            bg-white dark:bg-[#1F262F] border-3 rounded-3xl
            hover:shadow-xl hover:shadow-main-400 border-main-500
            text-center py-7 sm:py-10 px-4 sm:px-6 cursor-pointer
            transition-all duration-300">

  <!-- Icon -->
  <div>
    <span class="inline-flex justify-center items-center
                 w-14 h-14 sm:w-18 sm:h-18
                 rounded-full border border-main-500
                 hover:scale-110 hover:bg-main-500
                 group transition-all duration-300">
      <i [class]="service.icon" class="text-main-500 text-lg sm:text-xl fa-xl group-hover:text-white"></i>
    </span>
  </div>

  <!-- Title -->
  <h2 class="text-xl sm:text-2xl text-main-500
             py-5 sm:py-8 font-semibold
             min-h-fit sm:h-27">
    {{service.title}}
  </h2>

  <!-- Description -->
  <p class="text-base sm:text-xl flex-grow leading-relaxed">
    {{service.description}}
  </p>

</div>
