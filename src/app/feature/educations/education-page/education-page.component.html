<section class="relative overflow-hidden min-h-screen flex items-center
                pt-30 sm:pt-32 lg:pt-32 pb-14 sm:pb-20
                bg-gray-100 dark:bg-[#1F262F]
                transition-colors duration-500">

  <!-- Background blobs -->
  <div class="absolute top-20 left-5 sm:left-20 w-48 h-48 sm:w-72 sm:h-72
              bg-main-600/10 dark:bg-main-600/20
              rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-20 right-5 sm:right-20 w-48 h-48 sm:w-72 sm:h-72
              bg-purple-500/10 dark:bg-purple-600/15
              rounded-full blur-3xl pointer-events-none"></div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

    <!-- Header -->
    <div class="text-center mb-12 sm:mb-16">
      <h2 class="text-3xl sm:text-4xl font-bold text-main-600 dark:text-main-400" data-aos="fade-down"
        data-aos-delay="100">
        My Education
      </h2>
      <div class="w-12 h-0.5 bg-main-500/40 rounded-full mx-auto mt-3 mb-4"></div>
      <p class="text-base sm:text-lg font-semibold
                text-gray-700 dark:text-gray-300
                w-full sm:w-[85%] lg:w-[65%] mx-auto leading-relaxed" data-aos="fade-up" data-aos-delay="300">
        My academic training and hands-on experience that built my foundation
        as a frontend developer.
      </p>
    </div>

    <!-- Timeline -->
    <div class="relative max-w-3xl mx-auto">

      <!-- Vertical line -->
      <div class="absolute left-5 sm:left-8 top-0 bottom-0 w-0.5
                  bg-main-500/20 dark:bg-main-500/30"></div>

      @for (edu of education_arr; track $index) {
      <div class="relative flex gap-5 sm:gap-10 mb-8 sm:mb-10 last:mb-0" data-aos="fade-up-right"
        [attr.data-aos-delay]="$index * 200">

        <!-- Dot + Icon -->
        <div class="relative z-10 shrink-0">
          <div class="w-10 h-10 sm:w-16 sm:h-16 rounded-full
                        flex items-center justify-center
                        bg-white dark:bg-[#2a333e]
                        border-2 border-main-500
                        shadow-md shadow-main-500/20">
            <i [class]="edu.icon" class="text-main-500 text-sm sm:text-xl"></i>
          </div>
        </div>

        <!-- Card -->
        <app-education-card [edu]="edu"></app-education-card>
      </div>
      }

    </div>
  </div>
</section>
